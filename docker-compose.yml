services:
  finance:
    build:
      context: ./services/finance
      dockerfile: Dockerfile
      target: dev
    ports:
      - "8000:8000"
    environment:
      APP_ENV: dev
      APP_SECRET: ${FINANCE_APP_SECRET}
      DATABASE_URL: ${FINANCE_DATABASE_URL}
    volumes:
      - ./services/finance:/app      # hot reload: cambios en código reflejados sin rebuild
      - /app/vendor                  # vendor permanece del build, no se sobreescribe
    depends_on:
      - db

  user:
    build:
      context: ./services/user
      dockerfile: Dockerfile
      target: dev
    ports:
      - "3000:3000"
    environment:
      APP_ENV: dev
      MONGODB_URI: mongodb://mongodb:27017/users_db
    volumes:
      - ./services/user:/app
      - /app/node_modules
    depends_on:
      - mongodb

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: finance_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - db

  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  mongo-express:
    image: mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_BASICAUTH_USERNAME: ${ME_CONFIG_BASICAUTH_USERNAME}
      ME_CONFIG_BASICAUTH_PASSWORD: ${ME_CONFIG_BASICAUTH_PASSWORD}
    depends_on:
      - mongodb

volumes:
  pgdata:
  mongodb_data:
