services:
  finance:
    build:
      context: ./services/finance
      dockerfile: Dockerfile
      target: dev
    ports:
      - "8000:8000"
    environment:
      APP_ENV: dev
      APP_SECRET: ${FINANCE_APP_SECRET}
      DATABASE_URL: ${FINANCE_DATABASE_URL}
    volumes:
      - ./services/finance:/app      # hot reload: cambios en código reflejados sin rebuild
      - /app/vendor                  # vendor permanece del build, no se sobreescribe
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: finance_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
